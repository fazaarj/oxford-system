<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxford Aluminum & Glass — System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background:#080e1a; color:#e2e8f0; min-height:100vh; }

  /* SIDEBAR */
  .sidebar { width:220px; background:linear-gradient(180deg,#0b1526,#0d1f3a); border-right:1px solid rgba(99,179,237,0.1); position:fixed; top:0; left:0; height:100vh; display:flex; flex-direction:column; z-index:100; }
  .logo { padding:18px 20px; border-bottom:1px solid rgba(99,179,237,0.08); display:flex; align-items:center; gap:10px; }
  .logo-icon { width:34px; height:34px; border-radius:8px; background:linear-gradient(135deg,#1e88e5,#0d47a1); display:flex; align-items:center; justify-content:center; font-weight:900; color:white; font-size:16px; }
  .logo-text { font-size:13px; font-weight:800; color:#e2e8f0; }
  .logo-sub { font-size:9px; color:#475569; letter-spacing:0.1em; text-transform:uppercase; }
  .nav { flex:1; padding:12px 8px; overflow-y:auto; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:9px; margin-bottom:3px; cursor:pointer; border:1px solid transparent; transition:all 0.15s; color:#94a3b8; font-size:13px; font-weight:500; }
  .nav-item:hover { background:rgba(255,255,255,0.04); color:#e2e8f0; }
  .nav-item.active { background:rgba(30,136,229,0.2); border-color:rgba(30,136,229,0.3); color:#60a5fa; font-weight:700; }
  .nav-icon { font-size:18px; }
  .badge { width:18px; height:18px; border-radius:50%; background:#ef4444; color:white; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; margin-left:auto; }

  /* MAIN */
  .main { margin-left:220px; display:flex; flex-direction:column; min-height:100vh; }
  .topbar { background:linear-gradient(135deg,#0b1526,#152240); border-bottom:1px solid rgba(99,179,237,0.12); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:50; }
  .topbar-title { display:flex; align-items:center; gap:10px; font-size:15px; font-weight:700; }
  .date-badge { font-size:11px; color:#475569; padding:2px 10px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(99,179,237,0.08); }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .btn-primary { padding:7px 16px; border-radius:7px; border:none; background:linear-gradient(135deg,#1e88e5,#0d47a1); color:white; font-size:12px; font-weight:700; cursor:pointer; }
  .btn-secondary { padding:7px 16px; border-radius:7px; border:1px solid rgba(99,179,237,0.2); background:rgba(30,136,229,0.1); color:#60a5fa; font-size:12px; font-weight:600; cursor:pointer; }
  .avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#1e88e5,#0d47a1); display:flex; align-items:center; justify-content:center; font-weight:800; color:white; font-size:13px; }

  /* CONTENT */
  .content { padding:24px; flex:1; }

  /* CARDS */
  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
  .stat-card { background:linear-gradient(135deg,#0d1b2a,#111f35); border:1px solid rgba(99,179,237,0.1); border-radius:12px; padding:16px; position:relative; overflow:hidden; cursor:pointer; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .stat-card.blue::before { background:#3b82f6; }
  .stat-card.green::before { background:#10b981; }
  .stat-card.yellow::before { background:#f59e0b; }
  .stat-card.red::before { background:#ef4444; }
  .stat-label { font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
  .stat-value { font-size:24px; font-weight:800; }
  .stat-sub { font-size:11px; color:#475569; margin-top:4px; }

  /* TABLE */
  .table-container { background:linear-gradient(135deg,#0d1b2a,#111f35); border:1px solid rgba(99,179,237,0.1); border-radius:13px; overflow:hidden; }
  .table-header { padding:16px 20px; border-bottom:1px solid rgba(99,179,237,0.08); display:flex; justify-content:space-between; align-items:center; }
  .table-title { font-size:14px; font-weight:700; }
  table { width:100%; border-collapse:collapse; }
  th { padding:11px 14px; text-align:left; font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:0.06em; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(99,179,237,0.08); }
  td { padding:12px 14px; font-size:12px; border-bottom:1px solid rgba(99,179,237,0.04); }
  tr:hover td { background:rgba(255,255,255,0.02); }

  /* BADGE */
  .status-badge { padding:3px 9px; border-radius:4px; font-size:10px; font-weight:700; }
  .badge-green { background:rgba(16,185,129,0.15); color:#10b981; }
  .badge-yellow { background:rgba(245,158,11,0.15); color:#f59e0b; }
  .badge-red { background:rgba(239,68,68,0.15); color:#ef4444; }
  .badge-blue { background:rgba(59,130,246,0.15); color:#3b82f6; }

  /* PROGRESS BAR */
  .progress-bar { height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; margin-top:4px; }
  .progress-fill { height:100%; border-radius:3px; }

  /* MODAL */
  .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:200; display:none; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:#0d1b2a; border:1px solid rgba(99,179,237,0.2); border-radius:16px; padding:28px; width:560px; max-width:90vw; max-height:90vh; overflow-y:auto; }
  .modal-title { font-size:16px; font-weight:700; margin-bottom:20px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  label { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:0.06em; }
  input, select, textarea { background:rgba(255,255,255,0.04); border:1px solid rgba(99,179,237,0.15); border-radius:7px; padding:9px 12px; font-size:12px; color:#e2e8f0; outline:none; width:100%; }
  input:focus, select:focus, textarea:focus { border-color:rgba(99,179,237,0.4); }
  select option { background:#0d1b2a; }
  .modal-footer { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; color:#475569; }
  .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-text { font-size:14px; margin-bottom:16px; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:10px; font-size:13px; font-weight:600; z-index:300; animation:slideIn 0.3s ease; }
  .toast.success { background:#10b981; color:white; }
  .toast.error { background:#ef4444; color:white; }
  @keyframes slideIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

  /* LOADING */
  .loading { text-align:center; padding:40px; color:#64748b; font-size:13px; }
</style>
</head>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">O</div>
    <div>
      <div class="logo-text">OXFORD</div>

    </div>

  <div class="nav">

      <div class="form-group"><label>Start Date</label><input id="p-start" type="date"></div>

<!-- ADD INQUIRY MODAL -->

      <div class="form-group"><label>Channel</label><select id="i-channel"><option>WhatsApp</option><option>Office Visit</option><option>Email</option><option>Phone Call</option><option>Referral</option></select></div>
      <div class="form-group full"><label>Project Description</label><input id="i-desc" placeholder="Villa, apartment, commercial..."></div>

      <div class="form-group"><label>Priority (1-5)</label><select id="i-priority"><option>5 — Hot</option><option>4</option><option>3 — Medium</option><option>2</option><option>1 — Low</option></select></div>

    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('invoice-modal')">Cancel</button>
      <button class="btn-primary" onclick="saveInvoice()">Save Invoice</button>

  </div>
</div>

<!-- ADD EXPENSE MODAL -->
<div class="modal-overlay" id="expense-modal">

    <div class="modal-title">📈 Add Expense</div>

      <div class="form-group"><label>Department</label><select id="emp-dept"><option>Site</option><option>Factory</option><option>Estimation</option><option>Technical</option><option>Procurement</option><option>HR</option><option>Accounts</option></select></div>
      <div class="form-group"><label>Nationality</label><input id="emp-nat" placeholder="Indian / Ethiopian..."></div>
      <div class="form-group"><label>Monthly Salary (AED)</label><input id="emp-salary" type="number" placeholder="0"></div>

<!-- ADD PO MODAL -->

    <div class="modal-title">🛒 Add Purchase Order</div>

      <div class="form-group"><label>PO Number</label><input id="po-number" placeholder="LPO/OAGI/..."></div>
      <div class="form-group"><label>Date</label><input id="po-date" type="date"></div>

<script>
// ── SUPABASE SETUP ────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://vohdgwzsvkbpxgmwnxcr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_cEwloxvr2rPxRCnB0z-pKA_KF4QsgOn';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentPage = 'dashboard';

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  showPage('dashboard');
});

// ── NAVIGATION ────────────────────────────────────────────────────────────────
const pageConfig = {
  dashboard:   { icon:'🏠', title:'Dashboard',   addBtn:false },
  projects:    { icon:'🏗️', title:'Projects',    addBtn:true  },
  inquiries:   { icon:'📊', title:'Estimation',  addBtn:true  },
  procurement: { icon:'🛒', title:'Procurement', addBtn:true  },
  invoices:    { icon:'💰', title:'Invoicing',   addBtn:true  },
  expenses:    { icon:'📈', title:'Accounts',    addBtn:true  },
  employees:   { icon:'👥', title:'HR',          addBtn:true  },
};

function showPage(page) {
  currentPage = page;
  const cfg = pageConfig[page];
  document.getElementById('page-icon').textContent = cfg.icon;
  document.getElementById('page-title').textContent = cfg.title;
  document.getElementById('add-btn').style.display = cfg.addBtn ? 'block' : 'none';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event?.currentTarget?.classList.add('active');
  const pages = { dashboard:loadDashboard, projects:loadProjects, inquiries:loadInquiries, procurement:loadProcurement, invoices:loadInvoices, expenses:loadExpenses, employees:loadEmployees };
  if(pages[page]) pages[page]();
}

function openAddModal() {
  const modals = { projects:'project-modal', inquiries:'inquiry-modal', procurement:'po-modal', invoices:'invoice-modal', expenses:'expense-modal', employees:'employee-modal' };
  if(modals[currentPage]) document.getElementById(modals[currentPage]).classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
const fmtAED = (n) => !n ? 'AED 0' : n >= 1000000 ? `AED ${(n/1000000).toFixed(1)}M` : n >= 1000 ? `AED ${(n/1000).toFixed(0)}K` : `AED ${Number(n).toLocaleString()}`;
const statusBadge = (s) => {
  const map = { active:'badge-blue', on_track:'badge-green', attention:'badge-yellow', delayed:'badge-red', completed:'badge-green', submitted:'badge-blue', pc_received:'badge-yellow', payment_received:'badge-green', overdue:'badge-red', draft:'badge-yellow', present:'badge-green', absent:'badge-red', pending:'badge-yellow', confirmed:'badge-blue', received:'badge-green', urgent:'badge-red', partial:'badge-yellow', won:'badge-green', lost:'badge-red', not_started:'badge-yellow', in_progress:'badge-blue', quote_sent:'badge-blue' };
  return `<span class="status-badge ${map[s]||'badge-blue'}">${s?.replace(/_/g,' ')}</span>`;
};

function calcVAT() {
  const amt = parseFloat(document.getElementById('inv-amount').value)||0;
  const vat = amt * 0.05;
  document.getElementById('inv-vat').value = vat.toFixed(2);
  document.getElementById('inv-total').value = (amt + vat).toFixed(2);
}

      </table>` : `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-text">No purchase orders yet. Add your first PO!</div></div>`}
    </div>`;
}

async function savePO() {
  const supplier = document.getElementById('po-supplier').value.trim();
  if(!supplier) { showToast('Supplier is required','error'); return; }
  const { error } = await db.from('purchase_orders').insert([{
    po_number: document.getElementById('po-number').value,
    po_date: document.getElementById('po-date').value||null,
    supplier, category: document.getElementById('po-cat').value,
    project_name: document.getElementById('po-project').value,
    amount: parseFloat(document.getElementById('po-amount').value)||0,
    payment_terms: document.getElementById('po-terms').value,
    expected_delivery: document.getElementById('po-delivery').value||null,
    status: document.getElementById('po-status').value,
    notes: document.getElementById('po-notes').value,
    received_pct: 0,
  }]);
  if(error) { showToast('Error: '+error.message,'error'); return; }
  showToast('✅ Purchase Order saved!');
  closeModal('po-modal');
  loadProcurement();
}
</script>
</body>
